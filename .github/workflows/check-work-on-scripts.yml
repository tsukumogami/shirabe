name: Check work-on scripts

on:
  pull_request:
    paths:
      - 'skills/work-on/scripts/**'

jobs:
  test-work-on-scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Run cascade tests
        run: bash skills/work-on/scripts/run-cascade_test.sh
