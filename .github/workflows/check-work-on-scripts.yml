name: Check work-on scripts

on:
  pull_request:
    paths:
      - 'skills/work-on/scripts/**'

jobs:
  test-work-on-scripts:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install jq (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y jq

      - name: Install jq (macOS)
        if: runner.os == 'macOS'
        run: brew install jq

      - name: Run cascade tests
        run: bash skills/work-on/scripts/run-cascade_test.sh
