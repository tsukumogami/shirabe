name: Lifecycle Check

# Example caller (in a downstream repo's .github/workflows/lifecycle.yml):
#
# name: Validate chain lifecycle
# on:
#   pull_request:
#     types: [opened, synchronize, reopened, ready_for_review, converted_to_draft]
# permissions:
#   contents: read
#   pull-requests: read
# jobs:
#   lifecycle:
#     uses: tsukumogami/shirabe/.github/workflows/lifecycle.yml@v0.10.0
#
# The caller must grant `pull-requests: read` (as above): a reusable workflow
# cannot request a permission the caller lacks, and the coordination merge-last
# gate below needs it for its live `gh` queries on a coordination PR. A
# single-repo consumer that never opens a coordination PR can grant only
# `contents: read` — the gate detects the non-coordination case from the event
# payload and skips before touching the API (see that step's comment). This
# mirrors how validate-pr-body.yml documents the caller-permissions contract.
#
# The reusable workflow runs the chain-aware passing-state check
# (`shirabe validate --lifecycle .`) against the caller repo's working
# tree, with the review posture set conditional on
# `github.event.pull_request.draft`. The whole-tree scan is the point —
# no `paths:` filter at the caller level, since the check inspects
# every chain in the tree regardless of which docs the diff touches.
#
# DRAFT PRs run in draft posture and pass against mid-PR chain
# states; READY PRs run in ready posture and require single-pr chains
# to be at their terminal (PLAN deleted, BRIEF/PRD Done, DESIGN
# Current). See docs/briefs/BRIEF-lifecycle-draft-ready-discipline.md
# for the DRAFT-vs-READY discipline.

on:
  workflow_call:

jobs:
  lifecycle:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Needed only by the coordination merge-last gate's live `gh` queries on
      # a genuine coordination PR. Declared here so the scope is not downscoped
      # away for coordination callers; the non-coordination skip path never
      # exercises it (it detects from the event payload). A caller that grants
      # only `contents: read` still runs the skip path cleanly.
      pull-requests: read
    steps:
      - name: Check PR context
        # Non-PR triggers (workflow_dispatch, etc.) have no pull_request
        # event payload to read `.draft` from; skip cleanly with a notice.
        run: |
          if [ -z "${{ github.base_ref }}" ]; then
            echo "::notice::Skipping lifecycle check: requires a PR context (github.base_ref is empty)"
            exit 0
          fi

      - name: Checkout caller repo
        # Fetch full history so the chain walker sees the working tree
        # as it stands on the PR's head commit. The lifecycle check is
        # whole-tree and does not consume `git diff`, but the checkout
        # still mirrors the validate-docs.yml pattern for consistency.
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Checkout shirabe
        # job.workflow_repository and job.workflow_sha resolve to the
        # called workflow's repository and commit SHA. For external
        # callers using `uses: tsukumogami/shirabe/.github/workflows/lifecycle.yml@<ref>`,
        # this picks up tsukumogami/shirabe at the called ref so the
        # binary matches the workflow contract. For the local
        # self-caller (`uses: ./.github/workflows/lifecycle.yml`), it
        # resolves to the caller repo at the caller's commit (this
        # PR's head), which is what we want.
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          path: .shirabe-src

      - name: Install Rust toolchain
        # Reads .shirabe-src/rust-toolchain.toml and installs the pinned channel.
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable

      - name: Cache Cargo
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684  # v4.2.3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            .shirabe-src/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('.shirabe-src/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build shirabe
        run: |
          cargo build --release --bin shirabe --manifest-path .shirabe-src/Cargo.toml
          install -m 0755 .shirabe-src/target/release/shirabe /usr/local/bin/shirabe

      - name: Run lifecycle check (R5 finalization-not-done guard)
        # The shell conditional reads github.event.pull_request.draft
        # and sets MODE_FLAG to --mode=ready when the PR is
        # ready-for-review (draft is false). DRAFT PRs leave MODE_FLAG
        # empty so the binary's default draft posture applies and the
        # check passes against mid-PR chain states. READY PRs run in
        # ready posture and require chains to be at their terminal
        # passing state. See
        # docs/decisions/DECISION-lifecycle-strict-mode-interface-2026-06-06.md
        # for the interface rationale.
        #
        # R5 (DESIGN-execute-friction D4): this ready-posture step IS the
        # finalization-not-done guard for /execute. A run whose finalization
        # did not complete (a manual/fallback or never-resumed run) leaves a
        # present PLAN and un-transitioned upstreams; under --mode=ready that
        # state fails L01 (exit 2) and the guard fires. The whole-tree
        # `--lifecycle .` scan covers every chain, so no separate per-seed
        # `--lifecycle-chain <DESIGN>` step is needed — duplicating it here
        # would re-run the identical ready-posture check. The draft == false
        # gating is the point: the guard asserts the finalized terminal only at
        # review time, never on a draft PR whose cascade is legitimately
        # mid-flight. See skills/execute/SKILL.md (Finalization-Not-Done Guard).
        run: |
          MODE_FLAG=""
          if [ "${{ github.event.pull_request.draft }}" = "false" ]; then
            MODE_FLAG="--mode=ready"
            echo "PR is ready-for-review; running in ready posture."
          else
            echo "PR is draft; running in draft posture (default)."
          fi
          shirabe validate \
            --visibility=${{ github.repository_visibility }} \
            --lifecycle . \
            $MODE_FLAG

      - name: Coordination merge-last gate
        # The non-bypassable merge-last backstop (DESIGN Decision D / F4),
        # driven by `shirabe validate --merge-gate` — a posture-aware validate
        # mode like every other merge-gating check. On a *coordination PR* that
        # is *ready* (draft == false), recompute "all indexed PRs merged + all
        # upstreams terminal" from authoritative LIVE `gh` queries and block the
        # ready check until the gate passes. The step is pinned to the same
        # `draft == false` trigger the strict check uses, so toggling a PR back
        # to draft cannot skip the gate — a draft PR runs neither the gate nor
        # strict mode, and only a ready PR is mergeable. Passing `--mode=ready`
        # makes a blocked gate an error here (under draft posture the same mode
        # would emit a notice and exit 0).
        #
        # Coordination-PR detection: the coordination PR body (authored by the
        # workflow skill from the template in references/coordination-strategy.md)
        # carries a fixed declaration line — the blockquote "This is a
        # **coordination PR** for a coordinated multi-repo effort." We grep the
        # PR body for that marker rather than relying on a label, so the signal
        # travels with the durable skill-authored body. A PR without the marker
        # is not a coordination PR and the gate is skipped (a no-op for ordinary
        # lifecycle PRs).
        #
        # Detection reads the body from the EVENT PAYLOAD (the PR_BODY env var),
        # not a live `gh pr view`. That is the fix for the merge-gate hard-fail:
        # the skip path for an ordinary PR must never shell out to the API, or a
        # downstream single-repo consumer that grants no `pull-requests` scope
        # dies at `gh pr view` under `set -e` before its own skip guard can run.
        # Reading the event payload lets the non-coordination case exit 0 with
        # zero API calls and zero PR permission. The body is passed through env
        # (never interpolated inline into the script) so an untrusted PR body
        # cannot reach the shell as code — the same injection-safe posture the
        # pr-body.yml author-login guard uses.
        #
        # F4: status is recomputed live by `shirabe validate --merge-gate` from
        # `gh`, never from the (editable) PR body — the body supplies only the
        # list of refs the step passes in. Fail closed: any unresolvable
        # PR/upstream blocks.
        env:
          # `gh` reads live PR/upstream status via the API on the coordination
          # path; the token is consumed by the subprocess only, never held by
          # the validator process (gh.rs model).
          GH_TOKEN: ${{ github.token }}
          # Coordination detection reads the PR body from the event payload
          # through this env var (never interpolated inline — injection surface).
          # The skip path for an ordinary PR consults only this and makes no API
          # call, so it needs no `pull-requests` scope.
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          # Only ready PRs run the gate (strict-mode pinned, mirrors the check
          # above). A draft PR is not mergeable, so the gate is moot there.
          if [ "${{ github.event.pull_request.draft }}" != "false" ]; then
            echo "PR is draft; skipping coordination merge-last gate."
            exit 0
          fi

          # Detect a coordination PR by the fixed declaration line in the
          # event-payload body. No `gh` here: an ordinary PR must skip without
          # any API call (see this step's comment). `printf | grep` inside the
          # `if !` condition is exempt from `set -e`, so a non-match (grep exit
          # 1) drives the skip branch instead of aborting the step.
          if ! printf '%s' "$PR_BODY" | grep -qF 'This is a **coordination PR**'; then
            echo "Not a coordination PR (no declaration marker); skipping merge-last gate."
            exit 0
          fi

          echo "Coordination PR detected and ready; running the merge-last gate."

          # A genuine coordination PR: re-read the body LIVE for ref extraction.
          # The index may have been edited after the triggering event, and this
          # path (unlike detection) is entitled to the API — a coordination PR
          # is fail-closed, so a missing `pull-requests` scope here SHOULD abort
          # the step (gh fails, command substitution non-zero, `set -e` exits).
          PR_NUMBER="${{ github.event.pull_request.number }}"
          BODY="$(gh pr view "$PR_NUMBER" --json body --jq '.body')"

          # The coordination PR body's PR-index lines carry the durable list of
          # `owner/repo:path#number` refs. Extract them as the index ONLY —
          # `validate --merge-gate` recomputes each ref's merged status LIVE via
          # `gh` (F4); the `| merged`/`| open` cell in the body is NOT consulted.
          # A public index line shape is: `- <node> | <owner/repo>:<path>#<n> | ...`
          # We pull the `owner/repo:path#number` token from each index line.
          mapfile -t PR_REFS < <(
            printf '%s\n' "$BODY" \
              | grep -oE '[A-Za-z0-9][A-Za-z0-9._-]*/[A-Za-z0-9._-]+:[^ |]+#[0-9]+' \
              | sort -u
          )

          GATE_ARGS=()
          for ref in "${PR_REFS[@]}"; do
            GATE_ARGS+=(--pr "$ref")
          done

          # No indexed PRs found in the body means the index is empty; a
          # coordination PR with an empty index has nothing to gate on yet, but
          # fail closed: an empty ready coordination PR should not merge silently.
          if [ "${#GATE_ARGS[@]}" -eq 0 ]; then
            echo "::error::Coordination PR is ready but its PR-index is empty; merge-last gate blocks."
            exit 1
          fi

          # A non-zero exit blocks the ready check (the merge-last backstop).
          # `--mode=ready`: this step only runs on ready PRs, so a blocked gate
          # must fail (under draft posture the same mode is a notice, exit 0).
          shirabe validate --merge-gate --mode=ready "${GATE_ARGS[@]}"
