name: Check plan scripts

on:
  pull_request:
    paths:
      - 'skills/plan/scripts/**'

jobs:
  test-plan-scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Run plan-to-tasks tests
        run: bash skills/plan/scripts/plan-to-tasks_test.sh

      - name: Run validate-plan tests
        run: bash skills/plan/scripts/validate-plan_test.sh
