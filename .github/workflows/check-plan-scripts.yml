name: Check plan scripts

on:
  pull_request:
    paths:
      - 'skills/plan/scripts/**'

jobs:
  test-plan-scripts:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install jq (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y jq

      - name: Install jq (macOS)
        if: runner.os == 'macOS'
        run: brew install jq

      # plan-to-tasks.sh uses declare -A (bash 4+); macOS ships bash 3.2
      - name: Install bash 5 (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install bash
          echo "/opt/homebrew/bin" >> "$GITHUB_PATH"

      - name: Run plan-to-tasks tests
        run: bash skills/plan/scripts/plan-to-tasks_test.sh

      - name: Run validate-plan tests
        run: bash skills/plan/scripts/validate-plan_test.sh
