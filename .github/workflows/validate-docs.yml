name: Validate Docs

# Example caller (in a downstream repo's .github/workflows/validate-docs.yml):
#
# name: Validate doc formats
# on:
#   pull_request:
#     paths: ['docs/**']
# jobs:
#   validate:
#     uses: tsukumogami/shirabe/.github/workflows/validate-docs.yml@v0.6.0
#     with:
#       custom-statuses: |
#         prd: [Draft, Accepted, In Progress, Done, Delivered]

on:
  workflow_call:
    inputs:
      custom-statuses:
        description: 'YAML map of schema version to custom status values (optional)'
        required: false
        type: string
        default: ''

jobs:
  validate-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check PR context
        # Non-PR triggers (workflow_dispatch, etc.) have no base_ref
        run: |
          if [ -z "${{ github.base_ref }}" ]; then
            echo "::notice::Skipping doc validation: requires a PR context (github.base_ref is empty)"
            exit 0
          fi

      - name: Checkout caller repo
        # Fetch full history so `git diff <base>...<head>` resolves both endpoints.
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Checkout shirabe
        # job.workflow_repository and job.workflow_sha resolve to the called
        # workflow's repository and commit SHA. For external callers using
        # `uses: tsukumogami/shirabe/.github/workflows/validate-docs.yml@<ref>`,
        # this picks up tsukumogami/shirabe at the called ref so the binary
        # matches the workflow contract. For the local self-caller
        # (`uses: ./.github/workflows/...`), it resolves to the caller repo at
        # the caller's commit (this PR's head), which is what we want.
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          path: .shirabe-src

      - name: Install Rust toolchain
        # Reads .shirabe-src/rust-toolchain.toml and installs the pinned channel.
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable

      - name: Cache Cargo
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684  # v4.2.3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            .shirabe-src/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('.shirabe-src/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build shirabe
        run: |
          cd .shirabe-src && cargo build --release --bin shirabe
          install -m 0755 .shirabe-src/target/release/shirabe /usr/local/bin/shirabe

      - name: Validate changed docs
        env:
          CUSTOM_STATUSES: ${{ inputs.custom-statuses }}
        run: |
          FILES=$(git diff --name-only --diff-filter=ACMR \
            ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }} \
            | grep -vE '(^|/)(evals|tests)/fixtures/' || true)

          if [ -z "$FILES" ]; then
            echo "::notice::No doc files changed in this PR"
            exit 0
          fi

          shirabe validate \
            --visibility=${{ github.repository_visibility }} \
            ${CUSTOM_STATUSES:+--custom-statuses="$CUSTOM_STATUSES"} \
            $FILES
