name: Check templates

on:
  pull_request:
    branches: [main]
    paths:
      - 'skills/*/koto-templates/**'

jobs:
  freshness:
    uses: tsukumogami/koto/.github/workflows/check-template-freshness.yml@main
    with:
      template-paths: 'skills/*/koto-templates/*.md'
      koto-version: 'v0.3.1'
