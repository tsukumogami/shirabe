name: Release Binaries

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - os: linux
            arch: arm64
            target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
          - os: darwin
            arch: amd64
            target: x86_64-apple-darwin
            runner: macos-latest
          - os: darwin
            arch: arm64
            target: aarch64-apple-darwin
            runner: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install Rust toolchain
        # Reads rust-toolchain.toml and adds the matrix target triple.
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross linker (linux arm64)
        if: matrix.os == 'linux' && matrix.arch == 'arm64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build release binary
        env:
          # Inject the tag as the version (mirrors the Go ldflags -X main.version);
          # build.rs reads SHIRABE_VERSION and embeds it for --version.
          SHIRABE_VERSION: ${{ github.ref_name }}
          # Linker for the linux arm64 cross target.
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --bin shirabe --target ${{ matrix.target }}

      - name: Stage asset (shirabe-<os>-<arch>)
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/shirabe" \
            "dist/shirabe-${{ matrix.os }}-${{ matrix.arch }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882  # v4.4.3
        with:
          name: shirabe-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/shirabe-${{ matrix.os }}-${{ matrix.arch }}
          if-no-files-found: error

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Download all build artifacts
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16  # v4.1.8
        with:
          path: staging

      - name: Assemble dist + checksums
        run: |
          mkdir -p dist
          # download-artifact nests each artifact under its own dir; flatten into dist/.
          find staging -type f -name 'shirabe-*' -exec cp {} dist/ \;
          chmod +x dist/shirabe-*
          ( cd dist && sha256sum shirabe-* > checksums.txt )
          ls -l dist

      - name: Upload assets to draft release or create one
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          ASSETS=(
            dist/shirabe-linux-amd64
            dist/shirabe-linux-arm64
            dist/shirabe-darwin-amd64
            dist/shirabe-darwin-arm64
            dist/checksums.txt
          )

          DRAFT=$(gh release view "$TAG" --json isDraft --jq '.isDraft' 2>/dev/null || echo "not_found")

          if [ "$DRAFT" = "true" ]; then
            echo "Draft release found for $TAG, uploading assets..."
            gh release upload "$TAG" "${ASSETS[@]}" --clobber
          else
            echo "No draft release found, creating one..."
            git fetch origin "refs/tags/${TAG}:refs/tags/${TAG}" --force
            git tag -l --format='%(contents)' "${TAG}" > /tmp/release-notes.md
            gh release create "$TAG" \
              --draft \
              --title "$TAG" \
              --notes-file /tmp/release-notes.md \
              "${ASSETS[@]}"
          fi
