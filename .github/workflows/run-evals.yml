name: Run skill evals

on:
  pull_request:
    paths:
      - 'skills/**'
  workflow_dispatch:
    inputs:
      skill:
        description: 'Skill name to eval (leave empty for all)'
        required: false
        default: ''

jobs:
  run-evals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install claude CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Install skill-creator plugin
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: claude plugin install skill-creator --scope user

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Run evals
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "${{ github.event.inputs.skill }}" ]; then
            scripts/run-evals.sh "${{ github.event.inputs.skill }}"
          else
            scripts/run-evals.sh --all
          fi
