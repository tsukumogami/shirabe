name: Release

on:
  workflow_call:
    inputs:
      version:
        description: 'Semver without v prefix (e.g., 0.3.0)'
        required: true
        type: string
      tag:
        description: 'Git tag with v prefix (e.g., v0.3.0)'
        required: true
        type: string
      ref:
        description: 'Branch to release from'
        required: true
        type: string
        default: main
      dry-run:
        description: 'Skip push and tag creation'
        required: false
        type: boolean
        default: false
      dev-suffix:
        description: 'Suffix for dev version (e.g., -dev, -SNAPSHOT)'
        required: false
        type: string
        default: '-dev'
    secrets:
      token:
        description: 'Push token (falls back to GITHUB_TOKEN)'
        required: false
    outputs:
      tag:
        description: 'The created tag name'
        value: ${{ jobs.release.outputs.tag }}
      release-url:
        description: 'URL of the draft release'
        value: ${{ jobs.release.outputs.release-url }}

  workflow_dispatch:
    inputs:
      version:
        description: 'Semver without v prefix (e.g., 0.3.0)'
        required: true
        type: string
      tag:
        description: 'Git tag with v prefix (e.g., v0.3.0)'
        required: true
        type: string
      ref:
        description: 'Branch to release from'
        required: true
        type: string
        default: main
      dry-run:
        description: 'Skip push and tag creation'
        required: false
        type: boolean
        default: false
      dev-suffix:
        description: 'Suffix for dev version'
        required: false
        type: string
        default: '-dev'

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag || steps.tag-dry-run.outputs.tag }}
      release-url: ${{ steps.tag.outputs.release-url || steps.tag-dry-run.outputs.release-url }}
    steps:
      - name: Validate inputs
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if ! echo "$INPUT_TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Tag '$INPUT_TAG' does not match v<major>.<minor>.<patch>"
            exit 1
          fi

      - name: Determine effective token
        id: token
        env:
          SECRET_TOKEN: ${{ secrets.token }}
          FALLBACK_TOKEN: ${{ github.token }}
        run: |
          if [ -n "$SECRET_TOKEN" ]; then
            echo "token=$SECRET_TOKEN" >> "$GITHUB_OUTPUT"
          else
            echo "token=$FALLBACK_TOKEN" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate token permissions
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
          REPO: ${{ github.repository }}
        run: |
          # Verify the token can push by checking repo permissions
          PERMISSION=$(gh api "repos/$REPO" --jq '.permissions.push // false')
          if [ "$PERMISSION" != "true" ]; then
            echo "::error::Token does not have push permission on $REPO"
            echo "If this repo has branch protection, pass a PAT via the token secret."
            exit 1
          fi

      - name: Validate no existing tag
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if git ls-remote --tags origin "$INPUT_TAG" | grep -qF "$INPUT_TAG"; then
            echo "::error::Tag $INPUT_TAG already exists on remote"
            echo "Delete it first: git push --delete origin $INPUT_TAG"
            exit 1
          fi

      - name: Validate draft release exists
        id: draft
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          # gh release view can't find drafts by tag when the git tag doesn't
          # exist yet. Use gh release list with jq filter instead.
          DRAFT_TAG=$(gh release list --json tagName,isDraft 2>/dev/null | \
            jq -r --arg tag "$INPUT_TAG" '.[] | select(.tagName == $tag and .isDraft) | .tagName' \
            2>/dev/null || echo "")

          if [ -z "$DRAFT_TAG" ]; then
            # Check if a non-draft release exists (already published)
            PUBLISHED=$(gh release list --json tagName,isDraft 2>/dev/null | \
              jq -r --arg tag "$INPUT_TAG" '.[] | select(.tagName == $tag and (.isDraft | not)) | .tagName' \
              2>/dev/null || echo "")
            if [ -n "$PUBLISHED" ]; then
              echo "::error::Release $INPUT_TAG exists and is already published"
              exit 1
            fi
            echo "::warning::No draft release found for $INPUT_TAG. Tag annotation will use a default message."
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            echo "Draft release found for $INPUT_TAG"
            echo "found=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.ref }}
          token: ${{ steps.token.outputs.token }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Stamp release version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [ -x .release/set-version.sh ]; then
            echo "Running .release/set-version.sh $INPUT_VERSION"
            .release/set-version.sh "$INPUT_VERSION"
          else
            echo "No .release/set-version.sh found, skipping version stamp"
          fi

      - name: Commit release version
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if git diff --quiet; then
            echo "No version file changes to commit"
          else
            git add -A
            git commit -m "chore(release): set version to $INPUT_TAG"
          fi

      - name: Create annotated tag
        if: ${{ inputs.dry-run == false }}
        id: tag
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
          INPUT_TAG: ${{ inputs.tag }}
          REPO: ${{ github.repository }}
          DRAFT_FOUND: ${{ steps.draft.outputs.found }}
        run: |
          if [ "$DRAFT_FOUND" = "true" ]; then
            # Extract release notes from the draft release via API
            gh api "repos/$REPO/releases" 2>/dev/null | \
              jq -r --arg tag "$INPUT_TAG" '.[] | select(.tag_name == $tag and .draft) | .body' \
              > /tmp/release-notes.md
          fi

          if [ -s /tmp/release-notes.md ]; then
            git tag -a "$INPUT_TAG" --cleanup=verbatim -F /tmp/release-notes.md
          else
            git tag -a "$INPUT_TAG" -m "Release $INPUT_TAG"
          fi

          echo "tag=$INPUT_TAG" >> "$GITHUB_OUTPUT"

          RELEASE_URL=$(gh api "repos/$REPO/releases" 2>/dev/null | \
            jq -r --arg tag "$INPUT_TAG" '.[] | select(.tag_name == $tag) | .html_url' \
            2>/dev/null || echo "")
          echo "release-url=${RELEASE_URL:-unknown}" >> "$GITHUB_OUTPUT"

      - name: Create annotated tag (dry-run)
        if: ${{ inputs.dry-run == true }}
        id: tag-dry-run
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          echo "DRY-RUN: Would create tag $INPUT_TAG at $(git rev-parse HEAD)"
          echo "tag=$INPUT_TAG" >> "$GITHUB_OUTPUT"
          echo "release-url=dry-run" >> "$GITHUB_OUTPUT"

      - name: Compute next dev version
        id: next-dev
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_DEV_SUFFIX: ${{ inputs.dev-suffix }}
        run: |
          VERSION="$INPUT_VERSION"
          SUFFIX="$INPUT_DEV_SUFFIX"
          # Bump patch: 0.3.0 -> 0.3.1
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          NEXT_PATCH=$((PATCH + 1))
          NEXT_DEV="${MAJOR}.${MINOR}.${NEXT_PATCH}${SUFFIX}"
          echo "version=$NEXT_DEV" >> "$GITHUB_OUTPUT"
          echo "Next dev version: $NEXT_DEV"

      - name: Stamp dev version
        env:
          NEXT_DEV_VERSION: ${{ steps.next-dev.outputs.version }}
        run: |
          if [ -x .release/set-version.sh ]; then
            echo "Running .release/set-version.sh $NEXT_DEV_VERSION"
            .release/set-version.sh "$NEXT_DEV_VERSION"
          else
            echo "No .release/set-version.sh found, skipping dev version stamp"
          fi

      - name: Commit dev version
        env:
          NEXT_DEV_VERSION: ${{ steps.next-dev.outputs.version }}
        run: |
          if git diff --quiet; then
            echo "No dev version changes to commit"
          else
            git add -A
            git commit -m "chore(release): advance to $NEXT_DEV_VERSION"
          fi

      - name: Push branch
        if: ${{ inputs.dry-run == false }}
        env:
          INPUT_REF: ${{ inputs.ref }}
        run: |
          echo "Pushing branch $INPUT_REF..."
          if ! git push origin "HEAD:$INPUT_REF"; then
            echo "::error::Push to $INPUT_REF failed"
            echo "If another commit landed, try: git pull --rebase origin $INPUT_REF && git push"
            exit 1
          fi

      - name: Push tag
        if: ${{ inputs.dry-run == false }}
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          echo "Pushing tag $INPUT_TAG..."
          if ! git push origin "$INPUT_TAG"; then
            echo "::error::Tag push failed for $INPUT_TAG"
            echo "Check if tag protection rules allow this token to create tags"
            exit 1
          fi

      - name: Dry-run summary
        if: ${{ inputs.dry-run == true }}
        env:
          INPUT_REF: ${{ inputs.ref }}
          INPUT_TAG: ${{ inputs.tag }}
          NEXT_DEV_VERSION: ${{ steps.next-dev.outputs.version }}
        run: |
          echo "=== DRY-RUN SUMMARY ==="
          echo "Would push branch $INPUT_REF with these commits:"
          git log --oneline "origin/$INPUT_REF..HEAD"
          echo ""
          echo "Would create tag $INPUT_TAG at:"
          git log --oneline -1 HEAD~1
          echo ""
          echo "Dev version on main after release: $NEXT_DEV_VERSION"
